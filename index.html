<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIチャート</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

/* 🔥 スプラッシュ全体 */
#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.8s ease;
}

/* 動画 */
#introVideo {
  width: 260px;
  height: 260px;
  object-fit: contain;
  border-radius: 30px;
}

/* フェードアウト */
#splash.hide {
  opacity: 0;
  pointer-events: none;
}

/* スキップ */
#skipBtn {
  position: fixed;
  bottom: 40px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 1px solid #555;
  padding: 10px 14px;
  border-radius: 10px;
  z-index: 10000;
}
</style>
</head>

<body>

<!-- 🔥 スプラッシュ -->
<div id="splash">
  <video id="introVideo" autoplay muted playsinline>
    <source src="./intro.mp4" type="video/mp4">
  </video>
</div>

<button id="skipBtn">スキップ</button>

<script>
const video = document.getElementById("introVideo");
const splash = document.getElementById("splash");

/* 🔥 メイン遷移（フェード付き） */
function goMain() {
  splash.classList.add("hide");

  setTimeout(() => {
    location.href = "./ima.html";
  }, 800);
}

/* 動画終了 */
video.addEventListener("ended", goMain);

/* スキップ */
document.getElementById("skipBtn").onclick = goMain;

/* 🔥 念のため強制遷移（動画止まった時対策） */
setTimeout(() => {
  goMain();
}, 4000);
</script>

<!-- 🔥 自動アップデート -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js").then(reg => {

    reg.onupdatefound = () => {
      const newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === "installed") {
          if (navigator.serviceWorker.controller) {
            if (confirm("新しいバージョンがあります。更新しますか？")) {
              location.reload();
            }
          }
        }
      };
    };

  });
}
</script>

</body>
</html>
