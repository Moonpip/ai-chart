<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIチャート</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 動画サイズ調整ここ */
#introVideo {
  width: 260px;   /* ←ここでサイズ変える */
  height: 260px;
  object-fit: contain;
  border-radius: 30px;
}

/* スキップボタン */
#skipBtn {
  position: fixed;
  bottom: 40px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: 1px solid #555;
  padding: 10px 14px;
  border-radius: 10px;
}
</style>
</head>

<body>

<video id="introVideo" autoplay muted playsinline>
  <source src="./intro.mp4" type="video/mp4">
</video>

<button id="skipBtn">スキップ</button>

<script>
const video = document.getElementById("introVideo");

function goMain() {
  location.href = "./ima.html";
}

video.addEventListener("ended", goMain);
document.getElementById("skipBtn").onclick = goMain;
</script>

</body>
</html>
