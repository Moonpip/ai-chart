<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>AIチャート</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #introWrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #introVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #skipBtn {
      position: fixed;
      right: 16px;
      bottom: 24px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    #skipBtn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="introWrap">
    <video id="introVideo" autoplay muted playsinline preload="auto">
      <source src="./intro.mp4" type="video/mp4">
    </video>
    <button id="skipBtn">スキップ</button>
  </div>

  <script>
    const video = document.getElementById("introVideo");
    const skipBtn = document.getElementById("skipBtn");

    function goMain() {
      location.href = "./ima.html";
    }

    video.addEventListener("ended", goMain);
    skipBtn.addEventListener("click", goMain);

    video.play().catch(() => {
      document.body.addEventListener("touchstart", () => {
        video.play().catch(() => {});
      }, { once: true });
    });

    setTimeout(() => {
      if (video.paused || video.readyState < 2) {
        goMain();
      }
    }, 15000);
  </script>
</body>
</html>
